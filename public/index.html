<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <title>Bolão da Copa</title>
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h2 class="text-center mb-0">
                    ⚽ Bolão da Copa
                </h2>
            </div>

            <div class="card-body">

                <!-- Formulário -->
                <form id="formBolao">

                    <input type="hidden" id="bolao">

                    <div class="mb-3">
                        <label for="jogo" class="form-label">
                            Jogo
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="jogo"
                            placeholder="Brasil x Argentina"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="participante" class="form-label">
                            Participante
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="participante"
                            placeholder="Digite o nome"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="palpite" class="form-label">
                            Palpite
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="palpite"
                            placeholder="Ex: 2 x 1"
                            required>
                    </div>

                    <div class="d-grid">
                        <button
                            type="submit"
                            class="btn btn-success btn-lg">
                            Salvar Palpite
                        </button>
                    </div>

                </form>

            </div>

        </div>

        <!-- Espaçamento -->
        <div class="my-5"></div>

        <!-- Tabela -->
        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">
                    Lista de Palpites
                </h3>
            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Jogo</th>
                                <th>Participante</th>
                                <th>Palpite</th>
                                <th>Ações</th>
                            </tr>

                        </thead>

                        <tbody id="tabelaBolao">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

</body>

</html>
